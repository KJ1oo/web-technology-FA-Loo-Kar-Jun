<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Campus Lost & Found System</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Hard changing styling */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            max-width: 400px;
            width: 100%;
        }
        #errorMessage {
            display: none;
        }
    </style>
</head>
<body class="login-page">
    <div class="container">
        <div class="login-box">
            <div class="content-wrapper">
                <div class="text-center mb-4">
                    <h2>🔒 Admin Login</h2>
                    <p>Enter credentials to access admin panel</p>
                </div>
                
                <div id="errorMessage" class="alert alert-error mb-3" style="display: none;">
                    Invalid username or password
                </div>
                
                <form action="/admin/login" method="POST" class="form-container">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" class="form-control" 
                               placeholder="Enter admin username" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control" 
                               placeholder="Enter password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="/" class="back-home">← Back to Homepage</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost & Found Reports</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>
 <div class="container">
    <header>
      <div class="header-content">
        <div class="logo">
          <h1>     Campus Lost & Found System</h1>
        </div>
        <nav aria-label="Main Navigation">
          <a href="/">🏠 Home</a>
          <a href="/about" class="active">📖 Lost & Found</a>
          <a href="/report">📝 Report</a>
          <a href="/admin/login">🔒 Admin</a>
        </nav>
      </div>
    </header>


    
<!-- MAIN CONTENT -->
    <main>
      <div class="content-wrapper">

        <h2 class="text-center mb-4">Lost & Found Reports</h2>

        <!-- Reports Container -->
        <div id="reportsContainer"></div>

        <!-- Submit Button Section -->
        <div style="text-align:center; margin-top:30px;">
          <p>Didnt find your item?</p>
          <a href="/report" class="btn-primary">📝 Submit a Report</a>
        </div>

      </div>
    </main>



<footer>
      <div class="footer-content">
        <p>&copy; 2026 Campus Lost & Found System</p>
      </div>
</footer>

 <script>
    async function loadReports() {
      try {
        const res = await fetch('/api/public/items');
        const items = await res.json();

        const container = document.getElementById('reportsContainer');

        if (items.length === 0) {
          container.innerHTML = "<p>No reports available yet.</p>";
          return;
        }

        items.forEach(item => {
          const card = document.createElement('div');
          card.className = "card mb-3";

          card.innerHTML = `
            <h3>${item.title} (${item.category})</h3>
            <p><strong>Description:</strong> ${item.description}</p>
            <p><strong>Location:</strong> ${item.location}</p>
            <p><strong>Date:</strong> ${item.date}</p>
            <p><strong>Status:</strong> ${item.status}</p>
            <p><strong>Contact Email:</strong> ${item.contact}</p>
          `;

          container.appendChild(card);
        });

      } catch (error) {
        document.getElementById('reportsContainer').innerHTML =
          "<p>Unable to load reports. Please try again later.</p>";
      }
    }

    loadReports();
  </script>



</body>
</html>
